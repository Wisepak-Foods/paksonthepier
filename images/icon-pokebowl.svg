<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" aria-hidden="true">
  <!-- Bowl outer rim -->
  <circle cx="50" cy="50" r="44" fill="#3d2a1c"/>
  <!-- Inner: rice base -->
  <circle cx="50" cy="50" r="38" fill="#fafaf0"/>
  <!-- Salmon (orange) cubes -->
  <rect x="32" y="26" width="10" height="10" rx="1.5" fill="#F47B20" transform="rotate(-15 37 31)"/>
  <rect x="56" y="29" width="11" height="11" rx="1.5" fill="#F47B20" transform="rotate(10 61.5 34.5)"/>
  <rect x="36" y="60" width="10" height="10" rx="1.5" fill="#F47B20" transform="rotate(22 41 65)"/>
  <!-- Tuna (red) cubes -->
  <rect x="58" y="58" width="10" height="10" rx="1.5" fill="#E63946" transform="rotate(-6 63 63)"/>
  <rect x="24" y="46" width="9" height="9" rx="1.5" fill="#E63946" transform="rotate(15 28.5 50.5)"/>
  <rect x="62" y="42" width="9" height="9" rx="1.5" fill="#E63946" transform="rotate(-20 66.5 46.5)"/>
  <!-- Avocado ovals -->
  <ellipse cx="47" cy="42" rx="6" ry="4" fill="#7fb942"/>
  <ellipse cx="70" cy="62" rx="6" ry="4" fill="#7fb942" transform="rotate(20 70 62)"/>
  <!-- Edamame (bright green) -->
  <ellipse cx="28" cy="63" rx="3" ry="5" fill="#a3d96e"/>
  <ellipse cx="50" cy="70" rx="3" ry="5" fill="#a3d96e" transform="rotate(25 50 70)"/>
  <!-- Crispy onion -->
  <ellipse cx="42" cy="50" rx="2.5" ry="1" fill="#deb87a"/>
  <ellipse cx="56" cy="50" rx="2.5" ry="1" fill="#deb87a" transform="rotate(40 56 50)"/>
  <!-- Sesame seeds scattered -->
  <circle cx="50" cy="50" r="0.8" fill="#666"/>
  <circle cx="45" cy="55" r="0.8" fill="#666"/>
  <circle cx="58" cy="48" r="0.8" fill="#666"/>
  <circle cx="40" cy="45" r="0.8" fill="#666"/>
  <circle cx="55" cy="65" r="0.8" fill="#666"/>
  <!-- Bowl rim highlight -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#2a1810" stroke-width="1.5"/>
</svg>
